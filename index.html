<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación Especial</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin-top: 60px;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      color: #fff;
    }
    h1 { animation: bounceIn 1s ease; }
    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 20px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      transition: all 0.3s ease;
    }
    #siBtn { background-color: #4CAF50; color: white; }
    #noBtn { background-color: #f44336; color: white; position: absolute; }
    .hidden { display: none; }
    #verBtn {
      background-color: #222;
      color: #fff;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 8px;
      margin-top: 30px;
    }
    @keyframes bounceIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @media (max-width: 600px) {
      button { width: 80%; font-size: 16px; padding: 12px 20px; margin: 10px auto; display: block; }
      #noBtn { position: relative; margin: 15px auto; }
    }
  </style>
</head>
<body>

  <!-- Vista 1 -->
  <div id="vista1">
    <h1>¿Quieres salir conmigo?</h1>
    <button id="siBtn">Sí 💚</button>
    <button id="noBtn">No 🙈</button>
  </div>

  <!-- Vista 2 -->
  <div id="vista2" class="hidden">
    <h1>Elige nuestra cita ✨</h1>
    <button onclick="mostrarFinal('Golf')">Al mínimo golf ⛳</button>
    <button onclick="mostrarFinal('Café')">Ir por un café ☕</button>
  </div>

  <!-- Vista 3 -->
  <div id="vista3" class="hidden">
    <h1>Gracias por contestar 💖</h1>
    <p id="respuesta"></p>
    <button id="verBtn" onclick="verRespuestas()">Ver respuestas guardadas</button>
  </div>

  <!-- Firebase SDK (Compat) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDYlHoHAdVBENkYGXKPVOKE9Stl44H0OaM",
    authDomain: "invitacion-fb6eb.firebaseapp.com",
    projectId: "invitacion-fb6eb",
    storageBucket: "invitacion-fb6eb.appspot.com",
    messagingSenderId: "390082442274",
    appId: "1:390082442274:web:ad4790388067623a73867b"
  };

  let db = null;
  let firebaseReady = false;

  try {
    if (window.firebase) {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      firebaseReady = true;
    }
  } catch (error) {
    console.warn("Firebase no disponible, se usará almacenamiento local:", error);
  }

  const siBtn = document.getElementById("siBtn");
  const noBtn = document.getElementById("noBtn");
  const respuesta = document.getElementById("respuesta");
  let size = 18;
  let colorIntensity = 76;

  function guardarLocal(opcion) {
    const respuestas = JSON.parse(localStorage.getItem("respuestasInvitacion") || "[]");
    respuestas.push({
      respuesta: "Sí",
      cita: opcion,
      timestamp: new Date().toISOString()
    });
    localStorage.setItem("respuestasInvitacion", JSON.stringify(respuestas));
    return respuestas;
  }

  async function mostrarFinal(opcion) {
    document.getElementById("vista2").classList.add("hidden");
    document.getElementById("vista3").classList.remove("hidden");

    try {
      if (firebaseReady && db) {
        await db.collection("respuestas").add({
          respuesta: "Sí",
          cita: opcion,
          timestamp: new Date()
        });
        respuesta.innerText = "Elegiste: " + opcion + " · guardada en Firebase";
        return;
      }
    } catch (error) {
      console.warn("No se pudo guardar en Firebase, se usará almacenamiento local:", error);
    }

    guardarLocal(opcion);
    respuesta.innerText = "Elegiste: " + opcion + " · guardada localmente";
  }

  async function verRespuestas() {
    let datos = "";

    if (firebaseReady && db) {
      try {
        const querySnapshot = await db.collection("respuestas").get();
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          datos += "Respuesta: " + data.respuesta + " | Cita: " + data.cita + "\n";
        });
      } catch (error) {
        console.warn("No se pudo leer Firebase, se mostrará almacenamiento local:", error);
      }
    }

    const locales = JSON.parse(localStorage.getItem("respuestasInvitacion") || "[]");
    if (locales.length) {
      locales.forEach((item) => {
        datos += "Respuesta: " + item.respuesta + " | Cita: " + item.cita + "\n";
      });
    }

    if (!datos) {
      datos = "No hay respuestas guardadas todavía.";
    }

    alert(datos);
  }

  siBtn.addEventListener("click", () => {
    document.getElementById("vista1").classList.add("hidden");
    document.getElementById("vista2").classList.remove("hidden");
  });

  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    size += 4;
    colorIntensity += 20;
    siBtn.style.fontSize = size + "px";
    siBtn.style.backgroundColor = `rgb(${colorIntensity}, 180, ${colorIntensity})`;
    siBtn.style.boxShadow = `0 0 ${size/2}px rgba(0,255,0,0.6)`;
  });
</script>

</body>
</html>
